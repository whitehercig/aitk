<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JS Homework</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111827;
      color:white;
      min-height:100vh;
      padding:30px;
      transition:0.3s;
    }

    body.light{
      background:#f3f4f6;
      color:#111;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:40px;
    }

    .card{
      background:#1f2937;
      padding:20px;
      border-radius:15px;
      margin-bottom:25px;
      box-shadow:0 0 15px rgba(0,0,0,0.3);
      transition:0.3s;
      animation:fade 0.5s ease;
    }

    body.light .card{
      background:white;
    }

    button{
      padding:10px 15px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      margin-top:10px;
      background:#2563eb;
      color:white;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      outline:none;
    }

    ul{
      list-style:none;
      margin-top:15px;
    }

    li{
      background:#374151;
      padding:10px;
      border-radius:10px;
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      animation:fade 0.4s ease;
    }

    body.light li{
      background:#e5e7eb;
    }

    .delete{
      background:red;
      padding:5px 10px;
    }

    .error{
      color:#ff6b6b;
      margin-top:10px;
    }

    .success{
      color:#4ade80;
      margin-top:10px;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    pre{
      background:#0f172a;
      padding:15px;
      border-radius:10px;
      overflow:auto;
      margin-top:10px;
    }

    body.light pre{
      background:#dbeafe;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🔥 JS Homework Project</h1>

  <!-- Theme -->
  <div class="card">
    <h2>🌙 Переключатель темы</h2>
    <button id="themeBtn">Сменить тему</button>
  </div>

  <!-- Counter -->
  <div class="card">
    <h2>👀 Счётчик посещений</h2>
    <p>Количество посещений: <span id="visitCount">0</span></p>
  </div>

  <!-- ToDo -->
  <div class="card">
    <h2>✅ To-Do список</h2>

    <input type="text" id="todoInput" placeholder="Введите задачу">

    <button onclick="addTodo()">Добавить</button>

    <ul id="todoList"></ul>
  </div>

  <!-- Form -->
  <div class="card">
    <h2>📋 Форма с валидацией</h2>

    <input type="text" id="name" placeholder="Ваше имя">
    <input type="email" id="email" placeholder="Ваш email">

    <button onclick="validateForm()">Отправить</button>

    <p id="formMessage"></p>
  </div>

  <!-- Console Homework -->
  <div class="card">
    <h2>💻 JS1 Задания</h2>

    <p>Открой консоль браузера (F12 → Console)</p>

    <pre>
1. Проверка возраста
2. Массив студентов
3. Перебор массива
4. Расчёт оценки
    </pre>
  </div>

</div>

<script>

  // =========================
  // THEME
  // =========================

  const themeBtn = document.getElementById("themeBtn");

  if(localStorage.getItem("theme") === "light"){
    document.body.classList.add("light");
  }

  themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");

    if(document.body.classList.contains("light")){
      localStorage.setItem("theme", "light");
    } else {
      localStorage.setItem("theme", "dark");
    }
  });

  // =========================
  // VISITS COUNTER
  // =========================

  let visits = localStorage.getItem("visits");

  if(visits === null){
    visits = 1;
  } else {
    visits = Number(visits) + 1;
  }

  localStorage.setItem("visits", visits);

  document.getElementById("visitCount").textContent = visits;

  // =========================
  // TODO LIST
  // =========================

  const todoInput = document.getElementById("todoInput");
  const todoList = document.getElementById("todoList");

  let todos = JSON.parse(localStorage.getItem("todos")) || [];

  function renderTodos(){
    todoList.innerHTML = "";

    todos.forEach((todo, index) => {

      const li = document.createElement("li");

      li.innerHTML = `
        ${todo}
        <button class="delete" onclick="deleteTodo(${index})">
          X
        </button>
      `;

      todoList.appendChild(li);
    });
  }

  function addTodo(){

    if(todoInput.value.trim() === ""){
      return;
    }

    todos.push(todoInput.value);

    localStorage.setItem("todos", JSON.stringify(todos));

    renderTodos();

    todoInput.value = "";
  }

  function deleteTodo(index){

    todos.splice(index, 1);

    localStorage.setItem("todos", JSON.stringify(todos));

    renderTodos();
  }

  renderTodos();

  // =========================
  // FORM VALIDATION
  // =========================

  function validateForm(){

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    const message = document.getElementById("formMessage");

    if(name.length < 3){
      message.textContent = "Имя должно содержать минимум 3 буквы";
      message.className = "error";
      return;
    }

    if(!email.includes("@")){
      message.textContent = "Введите правильный email";
      message.className = "error";
      return;
    }

    message.textContent = "Форма успешно отправлена!";
    message.className = "success";
  }

  // =========================
  // JS1 HOMEWORK
  // =========================

  // Проверка возраста

  function checkAge(age){

    if(age >= 18){
      return "взрослый";
    } else {
      return "ребёнок";
    }
  }

  console.log("Возраст 20:", checkAge(20));
  console.log("Возраст 10:", checkAge(10));

  // Массив студентов

  const students = [
    {
      name: "Alex",
      age: 17,
      class: "10A"
    },

    {
      name: "Maria",
      age: 18,
      class: "11B"
    },

    {
      name: "John",
      age: 16,
      class: "9C"
    }
  ];

  // Перебор массива

  students.forEach(student => {

    console.log(
      `Имя: ${student.name}, Возраст: ${student.age}, Класс: ${student.class}`
    );

  });

  // Расчёт оценки

  function calculateGrade(points){

    if(points >= 90){
      return "A";
    }

    else if(points >= 70){
      return "B";
    }

    else{
      return "C";
    }
  }

  console.log("95 баллов:", calculateGrade(95));
  console.log("75 баллов:", calculateGrade(75));
  console.log("50 баллов:", calculateGrade(50));

</script>

</body>
</html>
